<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lise &amp; Adrian – del minnene</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --krem:#FAF7F1;     /* kortets hvite */
    --blekk:#1C1A17;    /* myk sort, som trykksverte */
    --grafitt:#55504A;  /* sekundærtekst */
    --rose:#C9A29A;     /* blek rosé, som blomstene på bordet */
    --blad:#A8B39F;     /* dempet bladgrønn */
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--krem);
    color:var(--blekk);
    font-family:'Cormorant Garamond',Georgia,serif;
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem 1.4rem;
    text-align:center;
  }
  ::selection{background:var(--blekk);color:var(--krem)}
  :focus-visible{outline:3px solid var(--blekk);outline-offset:4px;border-radius:4px}

  main{max-width:26rem;width:100%}

  .hjerte{display:block;margin:0 auto 1.6rem;color:var(--blekk)}

  h1{
    font-weight:500;
    font-size:clamp(1.7rem,7vw,2.3rem);
    letter-spacing:.28em;
    text-transform:uppercase;
    margin:0 0 .4rem;
    line-height:1.25;
    /* kompenser for letterspacing på siste tegn */
    padding-left:.28em;
  }
  .undertekst{
    font-style:italic;
    font-size:1.35rem;
    color:var(--grafitt);
    margin:0 0 .4rem;
  }
  .dato{
    font-size:1.05rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--grafitt);
    margin:0 0 2.8rem;
    padding-left:.14em;
  }

  .knapp{
    display:block;
    width:100%;
    background:var(--blekk);
    color:var(--krem);
    text-decoration:none;
    font-family:inherit;
    font-size:1.3rem;
    font-weight:500;
    letter-spacing:.06em;
    padding:1.05rem 1.4rem;
    min-height:60px;
    border:1.5px solid var(--blekk);
    border-radius:999px;
    transition:background .2s,color .2s;
  }
  .knapp:hover{background:var(--krem);color:var(--blekk)}

  .hint{
    font-style:italic;
    font-size:1.1rem;
    color:var(--grafitt);
    margin-top:1.1rem;
    line-height:1.5;
  }

  .roserad{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:.4rem;
    margin:-1rem 0 1.8rem;
  }
  .roserad svg{display:block}
  .roserad .liten{width:46px;opacity:.9}
  .roserad .stor{width:74px}

  footer{
    margin-top:2.8rem;
    font-size:.95rem;
    font-style:italic;
    color:var(--grafitt);
  }

  /* Roser i hjørnene – ren pynt, skjult for skjermlesere */
  .pynt{
    position:fixed;
    pointer-events:none;
    z-index:0;
  }
  .pynt--tv{top:-30px;left:-34px;width:min(34vw,230px);transform:rotate(8deg)}
  .pynt--nh{bottom:-36px;right:-30px;width:min(38vw,260px);transform:rotate(190deg)}
  .pynt--knopp{top:14px;right:-12px;width:min(20vw,120px);transform:rotate(-58deg)}
  main{position:relative;z-index:1}
  @media (max-width:480px){
    .pynt--tv{width:32vw}
    .pynt--nh{width:36vw}
    .pynt--knopp{display:none}
  }

  #varsel{
    background:#F3E2DE;
    color:#5A2E26;
    border:1px solid #D9B6AE;
    padding:.9rem 1.1rem;
    border-radius:16px;
    font-size:1.05rem;
    margin-bottom:1.6rem;
  }

  @media (prefers-reduced-motion: no-preference){
    main{animation:inn 1s ease both}
    @keyframes inn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  }
</style>
</head>
<body>
<!-- Strektegnede roser, i samme håndtegnede stil som hjertestreken -->
<svg width="0" height="0" aria-hidden="true" style="position:absolute">
  <symbol id="rose" viewBox="0 0 120 120">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- spiral i midten -->
      <path stroke="var(--rose)" stroke-width="1.6"
        d="M62 56 a4 4 0 1 0 4 5 a9 9 0 1 0 -13 6 a15 15 0 1 0 -5 -22 a22 22 0 1 0 30 9"/>
      <!-- ytre kronblad -->
      <path stroke="var(--rose)" stroke-width="1.6"
        d="M40 40 C 30 48, 28 66, 38 76 M48 84 C 60 92, 78 88, 86 76 M88 68 C 94 56, 90 42, 78 34"/>
      <!-- stilk -->
      <path stroke="var(--blad)" stroke-width="1.6" d="M58 88 C 56 100, 54 108, 50 118"/>
      <!-- blader med nerve -->
      <path stroke="var(--blad)" stroke-width="1.5"
        d="M54 102 C 44 96, 36 96, 30 102 C 36 110, 46 110, 54 104 M54 103 C 46 102, 40 102, 34 103"/>
      <path stroke="var(--blad)" stroke-width="1.5"
        d="M56 108 C 64 104, 72 105, 78 112 C 70 118, 62 117, 56 110 M57 109 C 64 110, 70 110, 75 112"/>
    </g>
  </symbol>
</svg>
<svg class="pynt pynt--tv" aria-hidden="true" viewBox="0 0 120 120"><use href="#rose"/></svg>
<svg class="pynt pynt--nh" aria-hidden="true" viewBox="0 0 120 120"><use href="#rose"/></svg>
<svg class="pynt pynt--knopp" aria-hidden="true" viewBox="0 0 120 120"><use href="#rose"/></svg>
<main>
  <!-- ==========================================================
       OPPSETT: lim inn Onedrive-lenken under (File request-adressen,
       den som ser ut som https://1drv.ms/....),
       og juster dato/tekster om ønskelig.
       ========================================================== -->
  <script>
    const OPPSETT = {
      opplastingsLenke: "https://1drv.ms/a/c/7cff59c29b95862e/IgCv41_C69JiSqJl7ZG5RazGAWi8KRmIJFXXXSaVK8FeSYk",
      dato: "18. juli 2026"
    };
  </script>

  <!-- Hjertestrek, som på bordkortet -->
  <svg class="hjerte" width="180" height="34" viewBox="0 0 180 34" fill="none" aria-hidden="true">
    <path d="M2 24 C 40 24, 58 24, 70 22"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M70 22 C 76 12, 88 6, 90 14 C 92 6, 104 12, 110 22 C 100 28, 92 30, 90 26 C 88 30, 80 28, 70 22 Z"
          stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
    <path d="M110 22 C 122 24, 140 24, 178 24"
          stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>

  <h1>Lise &amp; Adrian</h1>
  <p class="undertekst">Del minnene fra dagen vår</p>
  <p class="dato" id="dato"></p>

  <div id="varsel" hidden>Dropbox-lenken er ikke lagt inn ennå – åpne HTML-filen og lim den inn i feltet merket «OPPSETT».</div>

  <div class="roserad" id="roserad" aria-hidden="true" hidden>
    <svg class="liten" viewBox="0 0 120 120"><use href="#rose"/></svg>
    <svg class="stor" viewBox="0 0 120 120"><use href="#rose"/></svg>
    <svg class="liten" viewBox="0 0 120 120"><use href="#rose"/></svg>
  </div>

 <a class="knapp" id="lastOpp" href="#" target="_blank" rel="noopener noreferrer">Last opp bilder fra dagen</a>
  <footer>Tusen takk for at du deler &hearts;</footer>
</main>
<script>
  document.getElementById("dato").textContent = OPPSETT.dato || "";
  const knapp = document.getElementById("lastOpp");
  if (OPPSETT.opplastingsLenke.startsWith("https://")) {
    knapp.href = OPPSETT.opplastingsLenke;
    document.getElementById("roserad").hidden = false;
  } else {
    document.getElementById("varsel").hidden = false;
    knapp.addEventListener("click", e => e.preventDefault());
  }
</script>
</body>
</html>
